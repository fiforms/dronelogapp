<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1e40af"/>

  <!-- Drone body (center square) -->
  <rect x="208" y="208" width="96" height="96" rx="12" fill="#93c5fd"/>

  <!-- Drone arms -->
  <rect x="100" y="240" width="112" height="32" rx="8" fill="#60a5fa"/>
  <rect x="300" y="240" width="112" height="32" rx="8" fill="#60a5fa"/>
  <rect x="240" y="100" width="32" height="112" rx="8" fill="#60a5fa"/>
  <rect x="240" y="300" width="32" height="112" rx="8" fill="#60a5fa"/>

  <!-- Rotors -->
  <ellipse cx="130" cy="130" rx="55" ry="20" fill="#bfdbfe" opacity="0.8"/>
  <ellipse cx="382" cy="130" rx="55" ry="20" fill="#bfdbfe" opacity="0.8"/>
  <ellipse cx="130" cy="382" rx="55" ry="20" fill="#bfdbfe" opacity="0.8"/>
  <ellipse cx="382" cy="382" rx="55" ry="20" fill="#bfdbfe" opacity="0.8"/>

  <!-- Motor dots -->
  <circle cx="130" cy="130" r="14" fill="#1e3a8a"/>
  <circle cx="382" cy="130" r="14" fill="#1e3a8a"/>
  <circle cx="130" cy="382" r="14" fill="#1e3a8a"/>
  <circle cx="382" cy="382" r="14" fill="#1e3a8a"/>

  <!-- Camera gimbal -->
  <circle cx="256" cy="272" r="18" fill="#1e3a8a"/>
  <circle cx="256" cy="272" r="10" fill="#60a5fa"/>
</svg>
